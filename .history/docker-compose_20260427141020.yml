services:
  # ==========================================
  # 1. HẠ TẦNG DATABASE LÕI
  # ==========================================
  mysql-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: noah_store
    ports:
      - "33078:3306"
    networks:
      - noah-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - noah-network

  # ==========================================
  # 2. MODULE 1: ĐỒNG BỘ KHO
  # ==========================================
  legacy-adapter:
    build: ./inventory-sync
    depends_on:
      - mysql-db
    environment:
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=noah_store
    volumes:
      - ./inventory-sync/input:/app/input
      - ./inventory-sync/processed:/app/processed
    networks:
      - noah-network

  # ==========================================
  # 3. KONG GATEWAY & REALTIME SERVICE
  # ==========================================
  realtime-service:
    build: ./realtime-service
    ports:
      - "8001:8001"
    networks:
      - noah-network

  kong-database:
    image: postgres:13
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    ports:
      - "5432:5432"
    networks:
      - noah-network

  kong-migration:
    image: kong:3.0
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PASSWORD: kong
    depends_on:
      - kong-database
    networks:
      - noah-network

  kong:
    image: kong:3.0
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_STREAM_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000"   
      - "8002:8001"   
    depends_on:
      - kong-database
    networks:
      - noah-network

  # ==========================================
  # 4. MODULE 3: REPORT SERVICE
  # ==========================================
  report-service:
    build: ./report-service
    ports:
      - "7000:7000"
    depends_on:
      - mysql-db
    networks:
      - noah-network


networks:
  noah-network:
    driver: bridge
