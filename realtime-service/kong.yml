_format_version: "3.0"

services:
  - name: order-service
    url: http://order-api:8000
    routes:
      - name: order-route
        paths:
          - /orders
          - /products
        strip_path: false  

  - name: report-service
    url: http://report-service:7000
    routes:
      - name: report-route
        paths:
          - /report

  - name: realtime-service
    url: http://realtime-service:8001
    routes:
      - name: realtime-route
        paths:
          - /ws
        strip_path: false

plugins:
  - name: key-auth
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - apikey
      exposed_headers:
        - X-Auth-Token
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 1000
      policy: local

consumers:
  - username: noah-client
    keyauth_credentials:
      - key: noah-secret-key