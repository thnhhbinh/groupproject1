<!DOCTYPE html>
<html>
<head>
    <title>Realtime Test</title>
</head>
<body>
    <h2>WebSocket Test</h2>

    <button onclick="connect()">Connect WS</button>
    <button onclick="sendOrder()">Send Order</button>

    <pre id="log"></pre>

    <script>
        let ws;

        function log(msg) {
            document.getElementById("log").innerText += msg + "\n";
        }

        function connect() {
            ws = new WebSocket("ws://localhost:8002/ws"); // bypass Kong

            ws.onopen = () => log("✅ Connected");
            ws.onmessage = (e) => log("📩 " + e.data);
            ws.onerror = () => log("❌ Error");
            ws.onclose = () => log("🔌 Disconnected");
        }

        function sendOrder() {
            fetch("http://localhost:8000/orders", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    user_id: 1,
                    product_id: 101,
                    quantity: 1
                })
            })
            .then(res => res.json())
            .then(data => log("🚀 Sent order"))
            .catch(err => log("❌ API error"));
        }
    </script>
</body>
</html>
