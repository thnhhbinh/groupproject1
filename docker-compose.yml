version: '3.8'

services:
  # --- TẦNG HẠ TẦNG (Cơ sở dữ liệu & Messaging) ---
  mysql-db:
    image: mysql:8.0
    container_name: mysql_noah
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: web_store
    ports:
      - "3306:3306"
    networks:
      - noah-network

  postgres-db:
    image: postgres:15
    container_name: postgres_noah
    environment:
      POSTGRES_PASSWORD: pg_password
      POSTGRES_DB: finance
    ports:
      - "5432:5432"
    networks:
      - noah-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_noah
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - noah-network

  # --- MODULE 2: ORDER PIPELINE ---
  order-api:
    build: ./order_api
    container_name: order_api_service
    depends_on:
      - mysql-db
      - rabbitmq
    networks:
      - noah-network

  order-worker:
    build: ./order_worker
    container_name: order_worker_service
    depends_on:
      - postgres-db
      - rabbitmq
    networks:
      - noah-network

networks:
  noah-network:
    driver: bridge