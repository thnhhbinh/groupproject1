  # ==========================================
  # 3. KONG GATEWAY & REALTIME SERVICE
  # ==========================================
  realtime-service:
    build: ./realtime-service
    ports:
      - "8002:8001"
    networks:
      - noah-network

  kong-database:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong"]
      interval: 5s
      timeout: 5s
      retries: 5  
    image: postgres:13
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    networks:
      - noah-network

  kong-migration:
    image: kong:3.0
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_PASSWORD: kong
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - noah-network

  kong:
    image: kong:3.0
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
  
      # LOG
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr

      # PORT CHUẨN
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./realtime-service/kong.yml:/kong/kong.yml      
    ports:
      - "8000:8000"   
      - "8001:8001"   
    depends_on:
      - realtime-service
    networks:
      - noah-network


networks:
  noah-network:
    driver: bridge