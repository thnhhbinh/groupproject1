  # Message Broker (RabbitMQ) [cite: 23]
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_noah
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - noah-network

  # ==========================================
  # MODULE 4: BẢO MẬT & GATEWAY (KONG) [cite: 103]
  # ==========================================
  kong-database:
    image: postgres:13
    container_name: kong_db
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    networks:
      - noah-network

  kong-migration:
    image: kong:3.0
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    depends_on:
      - kong-database
    networks:
      - noah-network

  kong:
    image: kong:3.0
    container_name: kong_gateway
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
    ports:
      - "8000:8000"
      - "8002:8001"
    volumes:
      - ./kong/kong.yml:/usr/local/kong/kong.yml
    depends_on:
      - kong-migration
    networks:
      - noah-network

  # ==========================================
  # CÁC MODULE NGHIỆP VỤ [cite: 17]
  # ==========================================

  # Module 1: Legacy Adapter [cite: 25]
  legacy-adapter:
    build: ./inventory-sync
    container_name: legacy_adapter
    depends_on:
      mysql-db:
        condition: service_healthy
    volumes:
      - ./inventory-sync/input:/app/input
      - ./inventory-sync/processed:/app/processed
    environment:
      - DB_HOST=mysql-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=noah_store
    networks:
      - noah-network

